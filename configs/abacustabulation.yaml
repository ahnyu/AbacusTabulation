# Universal AbacusTabulation config.
# Both scripts accept this file through --path2config.

sim_params:
  sim_dir: /path/to/AbacusSummit
  sim_name: AbacusSummit_base_c000_ph000
  z_mock: 0.800
  cleaned_halos: true

# Shared paths may use {sim_name}, {z}, and {z_mock} format fields.
# {z} is formatted like z0.800.
paths:
  prepared_dir: &prepared_dir /path/to/prepared/{sim_name}/{z}
  paircounts_dir: &paircounts_dir /path/to/paircounts/{sim_name}/{z}

prepare_profiles:
  output_dir: *prepared_dir
  seed: 600
  overwrite: false
  n_parallel: 1
  slab_indices: null   # null means discover all halo_info slabs; or use [0, 1, 2]

  # Positions written by the preparation step:
  # real: pos is real-space only
  # rsd:  pos is redshift-space only
  # both: pos is real-space and pos_rsd is redshift-space
  position_space: real
  los_axis: z
  box_origin: center

  # NFW sample count rule: int(nfw_count_factor * N^2 + 1.5), then clipped.
  # null uses the built-in default: 2e-7, with the HugeBase scaling when relevant.
  nfw_count_factor: null
  min_particles_per_halo: 1
  max_particles_per_halo: null
  particle_chunk_size: 2000000

  # Satellite velocities only matter when position_space is rsd or both.
  satellite_velocity_model: gaussian

  # NFW profile concentration = numerator_key / denominator_key.
  # The NFW truncation radius remains r98_L2com.
  concentration_numerator_key: r98_L2com
  concentration_denominator_key: r25_L2com
  nfw_tolerance: 1.0e-5

  position_dtype: f4
  index_dtype: i4
  write_particle_radius: false
  hdf5_compression: null
  output_tag: abacustab_profiles

paircounts:
  prepared_dir: *prepared_dir
  output_dir: *paircounts_dir
  overwrite: false

  # If null, the paircount loader infers the prepared file tag when only one tag
  # exists in prepared_dir. Set this when multiple concentration/profile runs share
  # the same directory.
  file_tag: null
  seed: 600

  # Use pos for real-space prepared files or RSD-only prepared files.
  # Use pos_rsd only if prepare_profiles.position_space is both.
  position_dataset: pos
  clustering: [rppi]   # [rppi], [smu], or [rppi, smu]
  nthreads: 32
  boxsize: null        # null reads Lbox from prepared-file attrs
  corrfunc_dtype: f4
  hdf5_compression: null

  mass:
    nmass_bins: 20
    logm_min: null
    logm_max: null
    # Either null, a list of edges, or a path to a text file of log10 mass edges.
    logm_edges: null

  rppi:
    nrp_bins: 25
    rp_min: -1.5       # log10 rp lower edge
    rp_max: 1.477      # log10 rp upper edge
    pi_max: 40.0       # Corrfunc DDrppi returns unit-width pi bins up to pi_max

  smu:
    ns_bins: 25
    s_min: -1.5        # log10 s lower edge
    s_max: 1.477       # log10 s upper edge
    mu_max: 1.0
    nmu_bins: 120

# Example HOD block for Python-side clustering calls.
# abacustabulation.galaxy_correlation_from_config(...) reads this block.
# HOD parameter names are canonical-only; aliases such as logM_cut or pmax are rejected.
hod:
  model: lrg
  n_subbins: 20
  params:
    logMcut: 13.0
    sigma: 0.4
    logM1: 14.0
    kappa: 1.0
    alpha: 1.0
    a_c: 1.0
